<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026第十三屆國北烤雞盃混合排球賽</title>
  <!-- Tailwind CDN：註冊「Court Night」主題色（海軍藍 × 排球黃）與運動字體 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // 主色：深海軍藍（球場夜色）
            navy: {
              50: '#F4F7FB',
              100: '#E2E9F2',
              200: '#C5D3E4',
              300: '#9DB3CC',
              400: '#6E8BAB',
              500: '#3F618A',
              600: '#2A4A70',
              700: '#1B3A5C',
              800: '#12263F',
              900: '#0B1B2E',
            },
            // 強調色：排球黃（CTA 與 active 狀態專用）
            vbyellow: {
              50: '#FFF8E1',
              100: '#FFEFC0',
              200: '#FFE18A',
              300: '#FFD35C',
              400: '#FFC53D',
              500: '#F5B31A',
              600: '#D99A0B',
            },
            // 輔助藍：資訊與連結
            court: '#2E6FD8',
          },
          fontFamily: {
            display: ['"Barlow Condensed"', '"Noto Sans TC"', 'sans-serif'],
            sans: ['Barlow', '"Noto Sans TC"', 'Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <!-- Font Awesome：全站圖示（取代 emoji，確保跨平台顯示一致） -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-navy-50 min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
